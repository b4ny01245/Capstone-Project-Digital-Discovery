<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Digital Discovery</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <h1>Admin Panel</h1>
    <div id="modulesContainer"></div>
    <button onclick="addModule()">+ Add New Module</button>
    <button onclick="saveAll()">💾 Save All</button>

    <script>
        let data = [];

        // Load latest data.json
        function loadData() {
            fetch('data.json?_=' + new Date().getTime()) // prevent cache
                .then(res => res.json())
                .then(json => {
                    data = json;
                    renderModules();
                })
                .catch(err => console.error('Error loading data.json:', err));
        }

        // Render modules
        function renderModules() {
            const container = document.getElementById('modulesContainer');
            container.innerHTML = '';

            data.forEach((item) => {
                const div = document.createElement('div');
                div.classList.add('module');
                div.setAttribute('data-id', item.id);

                div.innerHTML = `
                    <label>Title:</label>
                    <input type="text" id="title${item.id}" value="${item.title}">
                    <label>Description:</label>
                    <textarea id="desc${item.id}">${item.description}</textarea>
                    <label>Video URL / Page Link:</label>
                    <input type="text" id="url${item.id}" value="${item.video_url}">
                    <label>Icon URL:</label>
                    <input type="text" id="icon${item.id}" value="${item.icon}">
                    <label>Modules / Videos Count:</label>
                    <input type="number" id="modules${item.id}" value="${item.modules}">
                    <br>
                    <button class="deleteBtn">❌ Delete</button>
                `;

                container.appendChild(div);

                // Delete handler
                div.querySelector('.deleteBtn').addEventListener('click', () => {
                    deleteModule(item.id);
                });
            });
        }

        // Add new module
        function addModule() {
            const newId = data.length ? Math.max(...data.map(m => m.id)) + 1 : 1;
            data.push({
                id: newId,
                title: '',
                description: '',
                video_url: '',
                icon: '',
                modules: 1
            });
            saveAll(true); // auto-save + reload
        }

        // Delete module
        function deleteModule(id) {
            if (confirm('Are you sure you want to delete this module?')) {
                data = data.filter(item => item.id !== id);
                saveAll(true); // auto-save + reload
            }
        }

        // Save all changes
        function saveAll(autoReload = false) {
            data.forEach((item) => {
                if (document.getElementById('title' + item.id)) {
                    item.title = document.getElementById('title' + item.id).value;
                    item.description = document.getElementById('desc' + item.id).value;
                    item.video_url = document.getElementById('url' + item.id).value;
                    item.icon = document.getElementById('icon' + item.id).value;
                    item.modules = parseInt(document.getElementById('modules' + item.id).value) || 1;
                }
            });

            fetch('save.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(() => {
                    if (!autoReload) alert('Saved successfully!');
                    loadData(); // refresh UI with latest data.json
                })
                .catch(err => alert('Error: ' + err));
        }

        // Initial load
        loadData();
    </script>

</body>

</html>
