<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Mockup</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        /* Phone Frame */
        .phone {
            position: relative;
            width: 375px;
            height: 812px;
            background: #1B1B1D;
            border-radius: 40px;
            padding: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* Screen Area */
        .screen {
            width: 100%;
            height: 100%;
            background: #F5F7FA;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }

        .screen.fade-out {
            opacity: 0;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #FFFFFF;
            font-size: 12px;
            color: #1B1B1D;
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 2px;
            margin-top: 50px;
        }

        .logo img {
            width: 80px;
        }

        /* Auth Container */
        .auth-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }

        .auth-input {
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .auth-button {
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            border: none;
            background-color: #1877F2;
            color: white;
            cursor: pointer;
        }

        .auth-link {
            text-align: center;
            color: #1877F2;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 15px;
            display: block;
        }

        a.create-account {
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            border: 2px dashed #1877F2;
            color: #1877F2;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        /* Redirect message */
        .redirect-message {
            display: none;
            flex-grow: 1;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #1B1B1D;
            text-align: center;
            padding: 20px;
        }

        .redirect-message.active {
            display: flex;
        }
    </style>
</head>

<body>
    <div class="phone">
        <div class="screen" id="screen">
            <div class="status-bar">
                <span>3:20 PM</span>
                <span>4G</span>
                <span>100%</span>
            </div>
            <div class="logo">
                <img src="fb.png" alt="Facebook Logo">
            </div>
            <form id="loginForm">
                <div class="auth-container">
                    <input type="text" placeholder="Mobile number or email" class="auth-input" required>
                    <input type="password" placeholder="Password" class="auth-input" required>
                    <button type="submit" class="auth-button">Log In</button>
                    <a href="#" id="forgotPasswordBtn" class="auth-link">Forgot password?</a>
                    <a href="mock.html" id="createAccountBtn" class="create-account">Create new account</a>
                </div>
            </form>
            <div class="redirect-message" id="redirectMessage">Logging in… Please wait.</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const forgotBtn = document.getElementById('forgotPasswordBtn');
            const screen = document.getElementById('screen');
            const redirectMessage = document.getElementById('redirectMessage');

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                // Check validity
                const inputs = form.querySelectorAll('input');
                let valid = true;
                inputs.forEach(input => {
                    if (!input.checkValidity()) valid = false;
                });

                if (valid) {
                    // Hide login form
                    form.style.display = 'none';
                    // Show redirect message
                    redirectMessage.classList.add('active');
                    // Fade out screen
                    screen.classList.add('fade-out');
                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = 'mockfb6.html';
                    }, 1000); // 1 second for effect
                }
            });

            forgotBtn.addEventListener('click', (e) => {
                e.preventDefault();
                alert('Redirecting to password recovery (mock).');
            });
        });
    </script>
</body>

</html>
